<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="520" height="520">
  <defs>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9f1c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff9f1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ballA" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#66eaff"/>
      <stop offset="100%" stop-color="#00aadd"/>
    </radialGradient>
    <radialGradient id="ballB" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffcc55"/>
      <stop offset="100%" stop-color="#dd8800"/>
    </radialGradient>
    <radialGradient id="ballHi" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff6090"/>
      <stop offset="100%" stop-color="#dd1050"/>
    </radialGradient>
    <radialGradient id="glowHi" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3068" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff3068" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes swap1 {
      0%, 10% { transform: translate(0, 0); }
      15% { transform: translate(0, 0); }
      55% { transform: translate(240px, 240px); }
      60%, 85% { transform: translate(240px, 240px); }
      95% { transform: translate(0, 0); }
      100% { transform: translate(0, 0); }
    }
    @keyframes swap1arc {
      0%, 10% { transform: translate(0, 0); }
      15% { transform: translate(0, 0); }
      35% { transform: translate(0, -50px); }
      55% { transform: translate(0, 0); }
      60%, 85% { transform: translate(0, 0); }
      75% { transform: translate(0, -50px); }
      95% { transform: translate(0, 0); }
      100% { transform: translate(0, 0); }
    }
    @keyframes swap2 {
      0%, 10% { transform: translate(0, 0); }
      15% { transform: translate(0, 0); }
      55% { transform: translate(-240px, -240px); }
      60%, 85% { transform: translate(-240px, -240px); }
      95% { transform: translate(0, 0); }
      100% { transform: translate(0, 0); }
    }
    @keyframes swap2arc {
      0%, 10% { transform: translate(0, 0); }
      15% { transform: translate(0, 0); }
      35% { transform: translate(0, 40px); }
      55% { transform: translate(0, 0); }
      60%, 85% { transform: translate(0, 0); }
      75% { transform: translate(0, 40px); }
      95% { transform: translate(0, 0); }
      100% { transform: translate(0, 0); }
    }
    @keyframes hiPulse {
      0%, 10% { opacity: 0.6; }
      35% { opacity: 1; }
      55% { opacity: 0.6; }
      60%, 85% { opacity: 0.6; }
      75% { opacity: 1; }
      95%, 100% { opacity: 0.6; }
    }
    @keyframes pathDash {
      0%, 10% { stroke-dashoffset: 500; opacity: 0; }
      15% { stroke-dashoffset: 500; opacity: 0.4; }
      55% { stroke-dashoffset: 0; opacity: 0.4; }
      60% { opacity: 0; }
      85% { stroke-dashoffset: 500; opacity: 0; }
      86% { opacity: 0.4; }
      95% { stroke-dashoffset: 0; opacity: 0.4; }
      100% { opacity: 0; }
    }
    @keyframes labelFade {
      0%, 8% { opacity: 0.8; }
      12%, 58% { opacity: 0; }
      62%, 83% { opacity: 0.8; }
      87%, 100% { opacity: 0; }
    }
    @keyframes checkFade {
      0%, 56% { opacity: 0; }
      60%, 83% { opacity: 1; }
      87%, 100% { opacity: 0; }
    }
    .swap-atom1 { animation: swap1 5s ease-in-out infinite; }
    .swap-arc1 { animation: swap1arc 5s ease-in-out infinite; }
    .swap-atom2 { animation: swap2 5s ease-in-out infinite; }
    .swap-arc2 { animation: swap2arc 5s ease-in-out infinite; }
    .hi-pulse { animation: hiPulse 5s ease-in-out infinite; }
    .path-dash { animation: pathDash 5s ease-in-out infinite; stroke-dasharray: 8 6; }
    .label-fade { animation: labelFade 5s ease-in-out infinite; }
    .check-fade { animation: checkFade 5s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="520" height="520" fill="#080c18" rx="12"/>

  <!-- Title -->
  <text x="260" y="32" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="monospace" font-size="9" letter-spacing="3">CRYSTAL SYMMETRY</text>
  <text x="260" y="50" text-anchor="middle" fill="#ff3068" font-family="monospace" font-size="14" font-weight="bold">⇄ Permutation Invariance</text>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="80" y1="80" x2="80" y2="440"/><line x1="140" y1="80" x2="140" y2="440"/>
    <line x1="200" y1="80" x2="200" y2="440"/><line x1="260" y1="80" x2="260" y2="440"/>
    <line x1="320" y1="80" x2="320" y2="440"/><line x1="380" y1="80" x2="380" y2="440"/>
    <line x1="440" y1="80" x2="440" y2="440"/>
    <line x1="80" y1="80" x2="440" y2="80"/><line x1="80" y1="140" x2="440" y2="140"/>
    <line x1="80" y1="200" x2="440" y2="200"/><line x1="80" y1="260" x2="440" y2="260"/>
    <line x1="80" y1="320" x2="440" y2="320"/><line x1="80" y1="380" x2="440" y2="380"/>
    <line x1="80" y1="440" x2="440" y2="440"/>
  </g>

  <!-- Bonds -->
  <g stroke="rgba(100,140,200,0.1)" stroke-width="1.5">
    <line x1="80" y1="80" x2="140" y2="80"/><line x1="140" y1="80" x2="200" y2="80"/><line x1="200" y1="80" x2="260" y2="80"/><line x1="260" y1="80" x2="320" y2="80"/><line x1="320" y1="80" x2="380" y2="80"/><line x1="380" y1="80" x2="440" y2="80"/>
    <line x1="80" y1="140" x2="140" y2="140"/><line x1="140" y1="140" x2="200" y2="140"/><line x1="200" y1="140" x2="260" y2="140"/><line x1="260" y1="140" x2="320" y2="140"/><line x1="320" y1="140" x2="380" y2="140"/><line x1="380" y1="140" x2="440" y2="140"/>
    <line x1="80" y1="200" x2="140" y2="200"/><line x1="140" y1="200" x2="200" y2="200"/><line x1="200" y1="200" x2="260" y2="200"/><line x1="260" y1="200" x2="320" y2="200"/><line x1="320" y1="200" x2="380" y2="200"/><line x1="380" y1="200" x2="440" y2="200"/>
    <line x1="80" y1="260" x2="140" y2="260"/><line x1="140" y1="260" x2="200" y2="260"/><line x1="200" y1="260" x2="260" y2="260"/><line x1="260" y1="260" x2="320" y2="260"/><line x1="320" y1="260" x2="380" y2="260"/><line x1="380" y1="260" x2="440" y2="260"/>
    <line x1="80" y1="320" x2="140" y2="320"/><line x1="140" y1="320" x2="200" y2="320"/><line x1="200" y1="320" x2="260" y2="320"/><line x1="260" y1="320" x2="320" y2="320"/><line x1="320" y1="320" x2="380" y2="320"/><line x1="380" y1="320" x2="440" y2="320"/>
    <line x1="80" y1="380" x2="140" y2="380"/><line x1="140" y1="380" x2="200" y2="380"/><line x1="200" y1="380" x2="260" y2="380"/><line x1="260" y1="380" x2="320" y2="380"/><line x1="320" y1="380" x2="380" y2="380"/><line x1="380" y1="380" x2="440" y2="380"/>
    <line x1="80" y1="440" x2="140" y2="440"/><line x1="140" y1="440" x2="200" y2="440"/><line x1="200" y1="440" x2="260" y2="440"/><line x1="260" y1="440" x2="320" y2="440"/><line x1="320" y1="440" x2="380" y2="440"/><line x1="380" y1="440" x2="440" y2="440"/>
    <line x1="80" y1="80" x2="80" y2="140"/><line x1="80" y1="140" x2="80" y2="200"/><line x1="80" y1="200" x2="80" y2="260"/><line x1="80" y1="260" x2="80" y2="320"/><line x1="80" y1="320" x2="80" y2="380"/><line x1="80" y1="380" x2="80" y2="440"/>
    <line x1="140" y1="80" x2="140" y2="140"/><line x1="140" y1="140" x2="140" y2="200"/><line x1="140" y1="200" x2="140" y2="260"/><line x1="140" y1="260" x2="140" y2="320"/><line x1="140" y1="320" x2="140" y2="380"/><line x1="140" y1="380" x2="140" y2="440"/>
    <line x1="200" y1="80" x2="200" y2="140"/><line x1="200" y1="140" x2="200" y2="200"/><line x1="200" y1="200" x2="200" y2="260"/><line x1="200" y1="260" x2="200" y2="320"/><line x1="200" y1="320" x2="200" y2="380"/><line x1="200" y1="380" x2="200" y2="440"/>
    <line x1="260" y1="80" x2="260" y2="140"/><line x1="260" y1="140" x2="260" y2="200"/><line x1="260" y1="200" x2="260" y2="260"/><line x1="260" y1="260" x2="260" y2="320"/><line x1="260" y1="320" x2="260" y2="380"/><line x1="260" y1="380" x2="260" y2="440"/>
    <line x1="320" y1="80" x2="320" y2="140"/><line x1="320" y1="140" x2="320" y2="200"/><line x1="320" y1="200" x2="320" y2="260"/><line x1="320" y1="260" x2="320" y2="320"/><line x1="320" y1="320" x2="320" y2="380"/><line x1="320" y1="380" x2="320" y2="440"/>
    <line x1="380" y1="80" x2="380" y2="140"/><line x1="380" y1="140" x2="380" y2="200"/><line x1="380" y1="200" x2="380" y2="260"/><line x1="380" y1="260" x2="380" y2="320"/><line x1="380" y1="320" x2="380" y2="380"/><line x1="380" y1="380" x2="380" y2="440"/>
    <line x1="440" y1="80" x2="440" y2="140"/><line x1="440" y1="140" x2="440" y2="200"/><line x1="440" y1="200" x2="440" y2="260"/><line x1="440" y1="260" x2="440" y2="320"/><line x1="440" y1="320" x2="440" y2="380"/><line x1="440" y1="380" x2="440" y2="440"/>
  </g>

  <!-- Static atoms (not being swapped) -->
  <!-- Row 0: A B A B A B A  (y=80) -->
  <!-- We skip (0,0)=80,80 and (6,6)=440,440 as they are the swap pair -->
  <g>
    <!-- Type A atoms (cyan) - (i+j)%2==0 -->
    <circle cx="200" cy="80" r="28" fill="url(#glowA)"/><circle cx="200" cy="80" r="13" fill="url(#ballA)"/>
    <circle cx="320" cy="80" r="28" fill="url(#glowA)"/><circle cx="320" cy="80" r="13" fill="url(#ballA)"/>
    <circle cx="440" cy="80" r="28" fill="url(#glowA)"/><circle cx="440" cy="80" r="13" fill="url(#ballA)"/>
    <circle cx="140" cy="140" r="28" fill="url(#glowA)"/><circle cx="140" cy="140" r="13" fill="url(#ballA)"/>
    <circle cx="260" cy="140" r="28" fill="url(#glowA)"/><circle cx="260" cy="140" r="13" fill="url(#ballA)"/>
    <circle cx="380" cy="140" r="28" fill="url(#glowA)"/><circle cx="380" cy="140" r="13" fill="url(#ballA)"/>
    <circle cx="80" cy="200" r="28" fill="url(#glowA)"/><circle cx="80" cy="200" r="13" fill="url(#ballA)"/>
    <circle cx="200" cy="200" r="28" fill="url(#glowA)"/><circle cx="200" cy="200" r="13" fill="url(#ballA)"/>
    <circle cx="320" cy="200" r="28" fill="url(#glowA)"/><circle cx="320" cy="200" r="13" fill="url(#ballA)"/>
    <circle cx="440" cy="200" r="28" fill="url(#glowA)"/><circle cx="440" cy="200" r="13" fill="url(#ballA)"/>
    <circle cx="140" cy="260" r="28" fill="url(#glowA)"/><circle cx="140" cy="260" r="13" fill="url(#ballA)"/>
    <circle cx="260" cy="260" r="28" fill="url(#glowA)"/><circle cx="260" cy="260" r="13" fill="url(#ballA)"/>
    <circle cx="380" cy="260" r="28" fill="url(#glowA)"/><circle cx="380" cy="260" r="13" fill="url(#ballA)"/>
    <circle cx="80" cy="320" r="28" fill="url(#glowA)"/><circle cx="80" cy="320" r="13" fill="url(#ballA)"/>
    <circle cx="200" cy="320" r="28" fill="url(#glowA)"/><circle cx="200" cy="320" r="13" fill="url(#ballA)"/>
    <circle cx="320" cy="320" r="28" fill="url(#glowA)"/><circle cx="320" cy="320" r="13" fill="url(#ballA)"/>
    <circle cx="440" cy="320" r="28" fill="url(#glowA)"/><circle cx="440" cy="320" r="13" fill="url(#ballA)"/>
    <circle cx="140" cy="380" r="28" fill="url(#glowA)"/><circle cx="140" cy="380" r="13" fill="url(#ballA)"/>
    <circle cx="260" cy="380" r="28" fill="url(#glowA)"/><circle cx="260" cy="380" r="13" fill="url(#ballA)"/>
    <circle cx="380" cy="380" r="28" fill="url(#glowA)"/><circle cx="380" cy="380" r="13" fill="url(#ballA)"/>
    <circle cx="80" cy="440" r="28" fill="url(#glowA)"/><circle cx="80" cy="440" r="13" fill="url(#ballA)"/>
    <circle cx="200" cy="440" r="28" fill="url(#glowA)"/><circle cx="200" cy="440" r="13" fill="url(#ballA)"/>
    <circle cx="320" cy="440" r="28" fill="url(#glowA)"/><circle cx="320" cy="440" r="13" fill="url(#ballA)"/>

    <!-- Type B atoms (orange) - (i+j)%2==1 -->
    <circle cx="140" cy="80" r="22" fill="url(#glowB)"/><circle cx="140" cy="80" r="9" fill="url(#ballB)"/>
    <circle cx="260" cy="80" r="22" fill="url(#glowB)"/><circle cx="260" cy="80" r="9" fill="url(#ballB)"/>
    <circle cx="380" cy="80" r="22" fill="url(#glowB)"/><circle cx="380" cy="80" r="9" fill="url(#ballB)"/>
    <circle cx="80" cy="140" r="22" fill="url(#glowB)"/><circle cx="80" cy="140" r="9" fill="url(#ballB)"/>
    <circle cx="200" cy="140" r="22" fill="url(#glowB)"/><circle cx="200" cy="140" r="9" fill="url(#ballB)"/>
    <circle cx="320" cy="140" r="22" fill="url(#glowB)"/><circle cx="320" cy="140" r="9" fill="url(#ballB)"/>
    <circle cx="440" cy="140" r="22" fill="url(#glowB)"/><circle cx="440" cy="140" r="9" fill="url(#ballB)"/>
    <circle cx="140" cy="200" r="22" fill="url(#glowB)"/><circle cx="140" cy="200" r="9" fill="url(#ballB)"/>
    <circle cx="260" cy="200" r="22" fill="url(#glowB)"/><circle cx="260" cy="200" r="9" fill="url(#ballB)"/>
    <circle cx="380" cy="200" r="22" fill="url(#glowB)"/><circle cx="380" cy="200" r="9" fill="url(#ballB)"/>
    <circle cx="80" cy="260" r="22" fill="url(#glowB)"/><circle cx="80" cy="260" r="9" fill="url(#ballB)"/>
    <circle cx="200" cy="260" r="22" fill="url(#glowB)"/><circle cx="200" cy="260" r="9" fill="url(#ballB)"/>
    <circle cx="320" cy="260" r="22" fill="url(#glowB)"/><circle cx="320" cy="260" r="9" fill="url(#ballB)"/>
    <circle cx="440" cy="260" r="22" fill="url(#glowB)"/><circle cx="440" cy="260" r="9" fill="url(#ballB)"/>
    <circle cx="140" cy="320" r="22" fill="url(#glowB)"/><circle cx="140" cy="320" r="9" fill="url(#ballB)"/>
    <circle cx="260" cy="320" r="22" fill="url(#glowB)"/><circle cx="260" cy="320" r="9" fill="url(#ballB)"/>
    <circle cx="380" cy="320" r="22" fill="url(#glowB)"/><circle cx="380" cy="320" r="9" fill="url(#ballB)"/>
    <circle cx="80" cy="380" r="22" fill="url(#glowB)"/><circle cx="80" cy="380" r="9" fill="url(#ballB)"/>
    <circle cx="200" cy="380" r="22" fill="url(#glowB)"/><circle cx="200" cy="380" r="9" fill="url(#ballB)"/>
    <circle cx="320" cy="380" r="22" fill="url(#glowB)"/><circle cx="320" cy="380" r="9" fill="url(#ballB)"/>
    <circle cx="440" cy="380" r="22" fill="url(#glowB)"/><circle cx="440" cy="380" r="9" fill="url(#ballB)"/>
    <circle cx="140" cy="440" r="22" fill="url(#glowB)"/><circle cx="140" cy="440" r="9" fill="url(#ballB)"/>
    <circle cx="260" cy="440" r="22" fill="url(#glowB)"/><circle cx="260" cy="440" r="9" fill="url(#ballB)"/>
    <circle cx="380" cy="440" r="22" fill="url(#glowB)"/><circle cx="380" cy="440" r="9" fill="url(#ballB)"/>
  </g>

  <!-- Swap dashed paths -->
  <path d="M80,80 Q260,20 440,440" stroke="#ff3068" stroke-width="1.5" fill="none" class="path-dash"/>
  <path d="M440,440 Q260,500 80,80" stroke="#ff3068" stroke-width="1.5" fill="none" class="path-dash"/>

  <!-- Animated atom 1: A at (80,80) swaps to (320,320) which is (440,440) -->
  <g class="swap-atom1">
    <g class="swap-arc1">
      <circle cx="80" cy="80" r="32" fill="url(#glowHi)" class="hi-pulse"/>
      <circle cx="80" cy="80" r="14" fill="url(#ballHi)" filter="url(#softglow)"/>
    </g>
  </g>

  <!-- Animated atom 2: A at (440,440) swaps to (80,80) -->
  <g class="swap-atom2">
    <g class="swap-arc2">
      <circle cx="440" cy="440" r="32" fill="url(#glowHi)" class="hi-pulse"/>
      <circle cx="440" cy="440" r="14" fill="url(#ballHi)" filter="url(#softglow)"/>
    </g>
  </g>

  <!-- Labels i and j -->
  <text x="80" y="58" text-anchor="middle" fill="#ff3068" font-family="monospace" font-size="13" font-weight="bold" class="label-fade">i</text>
  <text x="440" y="465" text-anchor="middle" fill="#ff3068" font-family="monospace" font-size="13" font-weight="bold" class="label-fade">j</text>

  <!-- Bottom text -->
  <text x="260" y="495" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="11">Swapping identical atoms i ↔ j</text>
  <text x="260" y="512" text-anchor="middle" fill="#ff3068" font-family="monospace" font-size="11" font-weight="bold" class="check-fade">✓ Same crystal — properties unchanged</text>
</svg>
