<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="520" height="520">
  <defs>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9f1c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff9f1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ballA" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#66eaff"/>
      <stop offset="100%" stop-color="#00aadd"/>
    </radialGradient>
    <radialGradient id="ballB" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffcc55"/>
      <stop offset="100%" stop-color="#dd8800"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes rotate90 {
      0%, 10% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
      60%, 90% { transform: rotate(90deg); }
      95% { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes arcReveal {
      0%, 10% { stroke-dashoffset: 200; opacity: 0; }
      12% { opacity: 0.6; }
      50% { stroke-dashoffset: 0; opacity: 0.6; }
      55% { opacity: 0; }
      90%, 100% { opacity: 0; }
    }
    @keyframes centerPulse {
      0%, 10% { opacity: 0; }
      15% { opacity: 0.8; }
      50% { opacity: 0.8; }
      55%, 100% { opacity: 0; }
    }
    @keyframes labelShow {
      0%, 10% { opacity: 0; }
      25% { opacity: 0.7; }
      50% { opacity: 0.7; }
      55%, 100% { opacity: 0; }
    }
    @keyframes checkFade {
      0%, 52% { opacity: 0; }
      58%, 88% { opacity: 1; }
      93%, 100% { opacity: 0; }
    }
    .rot-group { animation: rotate90 5s ease-in-out infinite; transform-origin: 260px 260px; }
    .arc-line { animation: arcReveal 5s ease-in-out infinite; stroke-dasharray: 200; }
    .center-pulse { animation: centerPulse 5s ease-in-out infinite; }
    .label-show { animation: labelShow 5s ease-in-out infinite; }
    .check-fade { animation: checkFade 5s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="520" height="520" fill="#080c18" rx="12"/>

  <!-- Title -->
  <text x="260" y="32" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="monospace" font-size="9" letter-spacing="3">CRYSTAL SYMMETRY</text>
  <text x="260" y="50" text-anchor="middle" fill="#b388ff" font-family="monospace" font-size="14" font-weight="bold">↻ Rotation Invariance</text>

  <!-- Rotation arc indicator -->
  <circle cx="260" cy="260" r="24" fill="url(#centerGlow)" class="center-pulse"/>
  <circle cx="260" cy="260" r="4" fill="#b388ff" class="center-pulse"/>
  <path d="M260,118 A142,142 0 0,1 402,260" stroke="#b388ff" stroke-width="2" fill="none" stroke-dasharray="4 4" class="arc-line" opacity="0"/>

  <!-- 90° label -->
  <text x="370" y="170" fill="#b388ff" font-family="monospace" font-size="13" font-weight="bold" class="label-show">90°</text>

