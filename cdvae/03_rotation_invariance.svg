      <circle cx="380" cy="380" r="28" fill="url(#glowA)"/><circle cx="380" cy="380" r="13" fill="url(#ballA)"/>
      <circle cx="80" cy="440" r="28" fill="url(#glowA)"/><circle cx="80" cy="440" r="13" fill="url(#ballA)"/>
      <circle cx="200" cy="440" r="28" fill="url(#glowA)"/><circle cx="200" cy="440" r="13" fill="url(#ballA)"/>
      <circle cx="320" cy="440" r="28" fill="url(#glowA)"/><circle cx="320" cy="440" r="13" fill="url(#ballA)"/>
      <circle cx="440" cy="440" r="28" fill="url(#glowA)"/><circle cx="440" cy="440" r="13" fill="url(#ballA)"/>
