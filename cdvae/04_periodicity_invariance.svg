<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="520" height="520">
  <defs>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9f1c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff9f1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ballA" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#66eaff"/>
      <stop offset="100%" stop-color="#00aadd"/>
    </radialGradient>
    <radialGradient id="ballB" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffcc55"/>
      <stop offset="100%" stop-color="#dd8800"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes cellAppear {
      0%, 8% { opacity: 0; }
      20% { opacity: 1; }
      88% { opacity: 1; }
      95%, 100% { opacity: 0; }
    }
    @keyframes cellFill {
      0%, 8% { opacity: 0; }
      20% { opacity: 0.08; }
      88% { opacity: 0.08; }
      95%, 100% { opacity: 0; }
    }
    @keyframes arrowsAppear {
      0%, 15% { opacity: 0; }
      25% { opacity: 0.7; }
      88% { opacity: 0.7; }
      95%, 100% { opacity: 0; }
    }
    @keyframes ghost1 { 0%, 30% { opacity: 0; } 40% { opacity: 1; } 88% { opacity: 1; } 95%, 100% { opacity: 0; } }
    @keyframes ghost2 { 0%, 35% { opacity: 0; } 45% { opacity: 1; } 88% { opacity: 1; } 95%, 100% { opacity: 0; } }
    @keyframes ghost3 { 0%, 40% { opacity: 0; } 50% { opacity: 1; } 88% { opacity: 1; } 95%, 100% { opacity: 0; } }
    @keyframes ghost4 { 0%, 45% { opacity: 0; } 55% { opacity: 1; } 88% { opacity: 1; } 95%, 100% { opacity: 0; } }
    @keyframes ghost5 { 0%, 50% { opacity: 0; } 60% { opacity: 1; } 88% { opacity: 1; } 95%, 100% { opacity: 0; } }
    @keyframes ghost6 { 0%, 55% { opacity: 0; } 65% { opacity: 1; } 88% { opacity: 1; } 95%, 100% { opacity: 0; } }
    @keyframes ghost7 { 0%, 60% { opacity: 0; } 70% { opacity: 1; } 88% { opacity: 1; } 95%, 100% { opacity: 0; } }
    @keyframes ghost8 { 0%, 65% { opacity: 0; } 75% { opacity: 1; } 88% { opacity: 1; } 95%, 100% { opacity: 0; } }
    @keyframes checkFade {
      0%, 72% { opacity: 0; }
      78%, 88% { opacity: 1; }
      93%, 100% { opacity: 0; }
    }
    @keyframes labelAppear {
      0%, 18% { opacity: 0; }
      25% { opacity: 0.8; }
      88% { opacity: 0.8; }
      95%, 100% { opacity: 0; }
    }
    .cell-stroke { animation: cellAppear 6s ease-in-out infinite; }
    .cell-fill { animation: cellFill 6s ease-in-out infinite; }
    .arrows { animation: arrowsAppear 6s ease-in-out infinite; }
    .g1 { animation: ghost1 6s ease-in-out infinite; }
    .g2 { animation: ghost2 6s ease-in-out infinite; }
    .g3 { animation: ghost3 6s ease-in-out infinite; }
    .g4 { animation: ghost4 6s ease-in-out infinite; }
    .g5 { animation: ghost5 6s ease-in-out infinite; }
    .g6 { animation: ghost6 6s ease-in-out infinite; }
    .g7 { animation: ghost7 6s ease-in-out infinite; }
    .g8 { animation: ghost8 6s ease-in-out infinite; }
    .check-fade { animation: checkFade 6s ease-in-out infinite; }
    .label-appear { animation: labelAppear 6s ease-in-out infinite; }
  </style>

